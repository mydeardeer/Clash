name: Sync daily clash file

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2点（可改）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date and download file
        run: |
          DATE=$(date +%Y%m%d)
          URL="https://raw.githubusercontent.com/free-nodes/clashfree/main/clash${DATE}.yml"
          echo "Downloading: $URL"

          curl -fL "$URL" -o clash.yml

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add clash.yml

          git commit -m "Update clash config $(date +%Y%m%d)" || echo "No changes"
          git push
